<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>נועם - פיזיקה וטכנולוגיה</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --navy: #002b5b;
            --cyan: #2b6777;
            --kick: #f5a623;
        }

        body {
            font-family: 'Assistant', sans-serif;
            margin: 0;
            background-color: #f8fafc;
            color: var(--navy);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* יצירת המריחות והזרימה ברקע */
        .bg-flow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            filter: blur(80px);
            opacity: 0.4;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
        }

        .blob-1 { top: -10%; left: -10%; width: 500px; height: 500px; background: var(--navy); }
        .blob-2 { top: 20%; right: -5%; width: 400px; height: 400px; background: var(--cyan); }
        .blob-3 { bottom: -10%; left: 20%; width: 300px; height: 300px; background: var(--kick); opacity: 0.3; }

        header {
            padding: 80px 20px;
            text-align: center;
        }

        .hero-title {
            font-size: 4rem;
            font-weight: 700;
            margin: 0;
            background: linear-gradient(135deg, var(--navy), var(--cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            max-width: 1000px;
            margin: auto;
            padding: 20px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 24px;
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
        }

        .video-box {
            background: #000;
            min-height: 350px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .content-box {
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 25px;
        }

        .btn {
            padding: 15px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            text-align: center;
            transition: 0.3s;
            background: white;
            border: 1px solid #e2e8f0;
            color: var(--navy);
        }

        .btn:hover {
            border-color: var(--kick);
            transform: translateY(-3px);
        }

        .btn i { color: var(--kick); margin-left: 8px; }

        @media (max-width: 768px) {
            .glass-card { grid-template-columns: 1fr; }
            .hero-title { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

    <div class="bg-flow">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <header>
        <h1 class="hero-title">נועם.</h1>
        <p style="font-size: 1.2rem; opacity: 0.8;">מתמטיקה | פיזיקה | כימיה | טכנולוגיה | חינוך</p>
    </header>

    <div class="container">
        <div class="glass-card">
            <div class="video-box">
                <i class="fab fa-youtube fa-4x" style="color: var(--kick)"></i>
            </div>
            <div class="content-box">
                <h2 style="margin-top:0">מרכז המשאבים</h2>
                <p>המרחב הדיגיטלי ללמידה חדשנית וטכנולוגית.</p>
                <div class="btn-grid">
                    <a href="#" class="btn"><i class="fab fa-whatsapp"></i> וואטסאפ</a>
                    <a href="#" class="btn"><i class="fas fa-phone"></i> שיחה</a>
                    <a href="#" class="btn"><i class="fas fa-envelope"></i> אימייל</a>
                    <a href="#" class="btn"><i class="fas fa-map-marker-alt"></i> מיקום</a>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
