<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>נועם - פיזיקה, טכנולוגיה וחינוך</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #1a3a5f; /* כחול נייבי עמוק */
            --accent-color: #00d2ff;   /* תכלת טכנולוגי */
            --bg-color: #f8fafc;
            --text-color: #334155;
        }

        body {
            font-family: 'Assistant', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            line-height: 1.6;
        }

        header {
            background: linear-gradient(135deg, var(--primary-color) 0%, #112a45 100%);
            color: white;
            padding: 4rem 1rem;
            text-align: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        header h1 { margin: 0; font-size: 2.8rem; font-weight: 700; }
        header p { font-size: 1.2rem; opacity: 0.9; margin-top: 10px; }

        .container { max-width: 1000px; margin: -50px auto 40px; padding: 0 20px; }

        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* יחס 16:9 */
            height: 0;
            overflow: hidden;
            background: #e2e8f0;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-placeholder-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #64748b;
            text-align: center;
        }

        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .contact-item {
            text-align: center;
            padding: 20px;
            border-radius: 12px;
            background: #fff;
            transition: transform 0.3s ease;
            text-decoration: none;
            color: var(--primary-color);
            border: 1px solid #e2e8f0;
        }

        .contact-item:hover {
            transform: translateY(-5px);
            background: #f1f5f9;
        }

        .contact-item i {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: var(--accent-color);
        }

        .contact-item span { display: block; font-weight: 700; }

        footer { text-align: center; padding: 40px; color: #94a3b8; font-size: 0.9rem; }
    </style>
</head>
<body>

<header>
    <h1>נועם - פיזיקה, טכנולוגיה וחינוך</h1>
    <p>בית לחדשנות פדגוגית, אפליקציות לימודיות ותוכן מקצועי</p>
</header>

<div class="container">
    <div class="card">
        <div class="video-container">
            <div class="video-placeholder-text">
                <i class="fab fa-youtube fa-4x"></i>
                <p>כאן יופיע סרטון היוטיוב שלך<br><small>(נחבר אותו ברגע שיהיה מוכן)</small></p>
            </div>
        </div>
    </div>

    <div class="card">
        <h2 style="text-align: center; margin-top: 0;">בואו נדבר</h2>
        <div class="contact-grid">
            <a href="https://wa.me/YOUR_PHONE_HERE" target="_blank" class="contact-item">
                <i class="fab fa-whatsapp"></i>
                <span>WhatsApp</span>
            </a>
            <a href="tel:YOUR_PHONE_HERE" class="contact-item">
                <i class="fas fa-phone-alt"></i>
                <span>שיחה ישירה</span>
            </a>
            <a href="mailto:YOUR_EMAIL_HERE" class="contact-item">
                <i class="fas fa-envelope"></i>
                <span>דוא"ל</span>
            </a>
            <a href="#" class="contact-item">
                <i class="fas fa-map-marker-alt"></i>
                <span>שערי תקווה</span>
            </a>
        </div>
    </div>
</div>

<footer>
    © 2026 נועם | כל הזכויות שמורות
</footer>

</body>
</html>
