<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>נועם - פיזיקה, טכנולוגיה וחינוך</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --navy: #002b5b;       /* הכחול העמוק מהתמונה */
            --cyan-gradient: linear-gradient(135deg, #002b5b 0%, #2b6777 100%);
            --kick-color: #f5a623;  /* הכתום-זהב המקפיץ */
            --light-bg: #ffffff;
            --soft-gray: #f4f7f9;
        }

        body {
            font-family: 'Assistant', sans-serif;
            background-color: var(--soft-gray);
            color: var(--navy);
            margin: 0;
            overflow-x: hidden;
        }

        header {
            background: var(--light-bg);
            padding: 5rem 2rem;
            position: relative;
            border-bottom: 8px solid var(--navy);
            text-align: right;
        }

        /* אלמנט עיצובי מהתמונה - המשולשים/מעוינים */
        header::after {
            content: "";
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image: radial-gradient(circle at 10% 20%, rgba(0, 43, 91, 0.05) 0%, transparent 20%);
            pointer-events: none;
        }

        .hero-text h1 { 
            font-size: 3.5rem; 
            margin: 0; 
            color: var(--navy); 
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        .hero-text p { 
            font-size: 1.5rem; 
            color: #555; 
            border-right: 4px solid var(--kick-color);
            padding-right: 15px;
            margin-top: 10px;
        }

        .container { max-width: 1100px; margin: -40px auto 60px; padding: 0 20px; }

        .main-card {
            background: white;
            border-radius: 4px; /* מראה נקי ומרובע יותר כמו בתמונה */
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            display: grid;
            grid-template-columns: 1.5fr 1fr;
        }

        .video-section { background: #000; display: flex; align-items: center; justify-content: center; min-height: 400px; color: white; }

        .content-section { padding: 40px; background: white; }

        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 30px;
        }

        .contact-btn {
            display: flex;
            align-items: center;
            padding: 15px;
            background: var(--soft-gray);
            color: var(--navy);
            text-decoration: none;
            font-weight: 700;
            border-radius: 4px;
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .contact-btn:hover {
            border-color: var(--kick-color);
            background: white;
            transform: translateY(-2px);
        }

        .contact-btn i {
            margin-left: 10px;
            color: var(--kick-color); /* ה"קיק" באייקונים */
            font-size: 1.2rem;
        }

        .decorative-dots {
            display: flex; gap: 5px; margin-top: 20px;
        }
        .dot { width: 6px; height: 6px; background: var(--navy); border-radius: 50%; opacity: 0.3; }

        @media (max-width: 768px) {
            .main-card { grid-template-columns: 1fr; }
            .hero-text h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

<header>
    <div style="max-width: 1100px; margin: auto;">
        <div class="hero-text">
            <h1>נועם <span style="color:var(--kick-color)">.</span></h1>
            <p>פיזיקה | טכנולוגיה | חינוך</p>
        </div>
        <div class="decorative-dots">
            <div class="dot"></div><div class="dot"></div><div class="dot"></div>
        </div>
    </div>
</header>

<div class="container">
    <div class="main-card">
        <div class="video-section">
            <div style="text-align: center;">
                <i class="fab fa-youtube fa-3x" style="color: var(--kick-color); margin-bottom: 15px;"></i>
                <p>כאן יופיע הווידאו שלך</p>
            </div>
        </div>
        
        <div class="content-section">
            <h2 style="border-bottom: 2px solid var(--soft-gray); padding-bottom: 10px;">בואו נתחבר</h2>
            <p>מרכז משאבים דיגיטלי למורים, תלמידים והורים המחפשים למידה אחרת.</p>
            
            <div class="contact-grid">
                <a href="#" class="contact-btn"><i class="fab fa-whatsapp"></i> וואטסאפ</a>
                <a href="#" class="contact-btn"><i class="fas fa-phone"></i> שיחה</a>
                <a href="#" class="contact-btn"><i class="fas fa-envelope"></i> אימייל</a>
                <a href="#" class="contact-btn"><i class="fas fa-map-marker-alt"></i> מיקום</a>
            </div>
        </div>
    </div>
</div>

<footer style="text-align: center; padding: 20px; opacity: 0.6; font-size: 0.8rem;">
    © 2026 NOAM-SITE | תכנון וביצוע שלב אחר שלב
</footer>

</body>
</html>
